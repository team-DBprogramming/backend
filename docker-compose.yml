services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: ${ORACLE_CONTAINER_NAME}
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ${DB_USERNAME}
      APP_USER_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./src/main/resources/db/init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  oracle-data:
