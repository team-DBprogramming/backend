services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: ${ORACLE_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "127.0.0.1:1521:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ${DB_USERNAME}
      APP_USER_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./src/main/resources/db/init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  spring:
    build:
      context: .
    image: ${SPRING_IMAGE:-backend-spring:local}
    container_name: ${SPRING_CONTAINER_NAME}
    restart: unless-stopped
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT}
      DB_URL: ${DOCKER_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"

volumes:
  oracle-data:
