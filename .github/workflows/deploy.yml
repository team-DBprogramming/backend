name: Deploy backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGION: asia-northeast3
  ARTIFACT_REPOSITORY: backend
  IMAGE_NAME: spring-backend
  DEPLOY_PATH: /opt/app/backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE="$REGION-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/$ARTIFACT_REPOSITORY/$IMAGE_NAME"
          docker build \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            .

      - name: Push Docker image
        run: |
          IMAGE="$REGION-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/$ARTIFACT_REPOSITORY/$IMAGE_NAME"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Sync deployment files to Compute Engine
        run: |
          gcloud compute ssh "${{ vars.GCE_INSTANCE }}" \
            --zone "${{ vars.GCE_ZONE }}" \
            --quiet \
            --command "
              set -e
              sudo mkdir -p '$DEPLOY_PATH/src/main/resources'
              sudo chown -R \"\$(whoami):\$(id -gn)\" '$DEPLOY_PATH'
            "

          gcloud compute scp docker-compose.yml \
            "${{ vars.GCE_INSTANCE }}:$DEPLOY_PATH/docker-compose.yml" \
            --zone "${{ vars.GCE_ZONE }}" \
            --quiet

          gcloud compute scp --recurse src/main/resources/db \
            "${{ vars.GCE_INSTANCE }}:$DEPLOY_PATH/src/main/resources/" \
            --zone "${{ vars.GCE_ZONE }}" \
            --quiet

      - name: Deploy on Compute Engine
        run: |
          IMAGE="$REGION-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/$ARTIFACT_REPOSITORY/$IMAGE_NAME"
          gcloud compute ssh "${{ vars.GCE_INSTANCE }}" \
            --zone "${{ vars.GCE_ZONE }}" \
            --quiet \
            --command "
              set -e
              cd '$DEPLOY_PATH'
              set -a
              . ./.env
              set +a

              gcloud auth print-access-token | sudo docker login -u oauth2accesstoken --password-stdin 'https://$REGION-docker.pkg.dev'

              sudo env SPRING_IMAGE='$IMAGE:${{ github.sha }}' docker compose down -v
              sudo env SPRING_IMAGE='$IMAGE:${{ github.sha }}' docker compose pull oracle
              sudo env SPRING_IMAGE='$IMAGE:${{ github.sha }}' docker compose up -d oracle

              ORACLE_ID=\$(sudo docker compose ps -q oracle)
              for i in \$(seq 1 60); do
                STATUS=\$(sudo docker inspect -f '{{.State.Health.Status}}' \"\$ORACLE_ID\" 2>/dev/null || true)
                if [ \"\$STATUS\" = 'healthy' ]; then
                  break
                fi
                if [ \"\$i\" -eq 60 ]; then
                  sudo docker compose logs oracle
                  exit 1
                fi
                sleep 5
              done

              for i in \$(seq 1 120); do
                USER_COUNT=\$(printf 'WHENEVER SQLERROR EXIT SQL.SQLCODE\nSET HEADING OFF FEEDBACK OFF PAGESIZE 0 VERIFY OFF ECHO OFF\nSELECT CHR(83) || CHR(69) || CHR(69) || CHR(68) || CHR(95) || CHR(67) || CHR(79) || CHR(85) || CHR(78) || CHR(84) || CHR(61) || TO_CHAR(COUNT(*)) FROM user_account;\nEXIT\n' | sudo docker exec -i \"\$ORACLE_ID\" sqlplus -s \"\$DB_USERNAME/\$DB_PASSWORD@localhost:1521/XEPDB1\" 2>/tmp/oracle-seed-check.err | grep 'SEED_COUNT=' | cut -d= -f2 | tr -dc '0-9')
                if [ -n \"\$USER_COUNT\" ] && [ \"\$USER_COUNT\" -gt 0 ]; then
                  break
                fi
                if [ \"\$i\" -eq 120 ]; then
                  cat /tmp/oracle-seed-check.err || true
                  sudo docker compose logs oracle
                  exit 1
                fi
                sleep 5
              done

              sudo env SPRING_IMAGE='$IMAGE:${{ github.sha }}' docker compose pull spring
              sudo env SPRING_IMAGE='$IMAGE:${{ github.sha }}' docker compose up -d --no-build spring
              sudo docker image prune -f
            "
