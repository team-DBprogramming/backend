spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: backend
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT}

auth:
  jwt:
    secret: ${JWT_SECRET:backend-local-development-secret-key-change-me}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:30m}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:1d}
    remember-me-refresh-token-ttl: ${JWT_REMEMBER_ME_REFRESH_TOKEN_TTL:30d}
